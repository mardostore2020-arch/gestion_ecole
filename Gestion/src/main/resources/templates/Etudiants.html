<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Étudiants</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Style perso -->
    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Titre -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🎓 Liste des Étudiants</h2>

        <a href="#" class="btn btn-primary btn-custom">
            ➕ Ajouter
        </a>
        
        <a th:href="@{\/}" class="btn btn-secondary mb-3">
             ⬅ Retour accueil
        </a>
    </div>

    <!-- Carte -->
    <div class="card shadow p-4">

        <table class="table table-hover align-middle text-center">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="e : ${etudiants}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.nom}"></td>
                    <td th:text="${e.prenom}"></td>

                    <td>
                        <button class="btn btn-warning btn-sm btn-custom">✏️</button>
                        <button class="btn btn-danger btn-sm btn-custom">🗑️</button>
                    </td>
                </tr>

                <!-- Message si vide -->
                <tr th:if="${#lists.isEmpty(etudiants)}">
                    <td colspan="4" class="text-muted">
                        Aucun étudiant trouvé
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
