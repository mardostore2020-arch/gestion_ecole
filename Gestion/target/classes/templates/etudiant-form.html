<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Ajouter Etudiant</h2>

<form th:action="@{/etudiants}" th:object="${etudiant}" method="post">
<input type="text" th:field="*{nom}" placeholder="Nom" class="form-control mb-2"/>
<input type="text" th:field="*{prenom}" placeholder="Prenom" class="form-control mb-2"/>
<input type="text" th:field="*{matricule}" placeholder="Matricule" class="form-control mb-2"/>
<button class="btn btn-primary">Enregistrer</button>
</form>

</body>
</html>
